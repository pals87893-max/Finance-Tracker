<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/signup.css') }}" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
</head>

<body>
  <form action="{{ url_for('Sign_in') }}" method="POST">
    <div class="scene">
      <div class="card">
        <div class="card__deco"></div>

        <div class="card__header">
          <h1>Create account</h1>
          <p>Join us today — it's free</p>
        </div>

        <div class="card__body">

          <div class="row">
            <div class="field">
              <label for="fname">Name</label>
              <input type="text" name="username" id="fname" placeholder="John" required />
            </div>

            <div class="field">
              <label for="email">Email</label>
              <input type="email" name="user_email" id="email" placeholder="you@example.com" required />
            </div>
            {% if error %}
            <div style="padding: 20px; background-color: #f44336; color: white; margin-bottom: 15px;">
              <strong>Danger!</strong>
              <p>{{error}}</p>
            </div>
            {% endif %}

            <div class="field">
              <label for="password">Password</label>
              <input type="password" name="Password" id="password" placeholder="Min. 8 characters" required />
            </div>

            <div class="terms">
              <input type="checkbox" id="agree" required />
              <label for="agree">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy
                  Policy</a></label>
            </div>

            <button class="btn" type="submit">Create Account</button>

            <p class="login-link">
              Already have an account? <a href="{{ url_for('login') }}">log in</a>
            </p>

          </div>
        </div>

        <div class="bg-shapes">
          <span class="shape shape--1"></span>
          <span class="shape shape--2"></span>
          <span class="shape shape--3"></span>
        </div>
      </div>
  </form>
</body>

</html>
